seed: 42
data:
  dataset: yelp
  profile_path: datasets/yelp/item_profile.json
  data_dir: datasets/yelp/
  min_user_interactions: 5
  min_item_interactions: 5
  recency_half_life: 30.0
lightgcn:
  embedding_dim: 64
  n_layers: 3
pretrain:
  epochs: 1000
  batch_size: 1024
  lr: 0.001
  weight_decay: 0
  device: cuda
  num_workers: 8
  reg: 1e-4
  save_path: checkpoints/lightgcn_best_yelp_pretrain.pth
train:
  epochs: 1000
  batch_size: 2048
  lr: 0.0001
  weight_decay: 0
  num_workers: 8
  device: cuda
  reg: 1e-4
  item_top_ratio: 0.1
  save_path: checkpoints/lightgcn_best_yelp.pth
profile:
  num_clusters: 200
  top_k: 5
  cluster_representatives: 50
  item_top_ratio: 0.05
  profile_dim: 128
  prompt_user_examples: 5
  prompt_item_max_words: 80
  llm_placeholder: true
