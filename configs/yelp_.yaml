seed: 42
data:
  dataset: yelp
  profile_path: data_new/yelp/itm_prf.pkl
  data_dir: data_new/yelp
  min_user_interactions: 5
  min_item_interactions: 5
  recency_half_life: 30.0
lightgcn:
  embedding_dim: 64
  n_layers: 3
pretrain:
  epochs: 1000
  batch_size: 1024
  lr: 0.001
  weight_decay: 0
  device: cuda
  num_workers: 0
  reg: 1e-4
  save_path: checkpoints/lightgcn_best_yelp_pretrain.pth
train:
  epochs: 1
  batch_size: 1024
  lr: 0.0001
  weight_decay: 0
  num_workers: 0
  device: cuda
  reg: 1e-4
  eval_interval: 1
  save_path: checkpoints/lightgcn_budgeted_yelp_debug.pth
semantic:
  enable: true
  budget_ratio: 0.05
  min_selected_items: 2
  popularity_penalty: 0.15
  cache_dir: cache/semantic_items
  llama_url: http://127.0.0.1:8080/v1/chat/completions
  llama_model: local
  llama_max_tokens: 96
  llama_temperature: 0.2
  request_timeout: 60
  disable_proxy_for_local: true
  embedding_model_path: /home/stu256475/.cache/huggingface/hub/models--Qwen--Qwen3-Embedding-0.6B/snapshots/c54f2e6e80b2d7b7de06f51cec4959f6b3e03418
  embedding_batch_size: 8
  align_weight: 0.05
  consistency_weight: 0.05
  freeze_backbone_epochs: 1
  save_artifacts: true
