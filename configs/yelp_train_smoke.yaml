seed: 42
data:
  dataset: yelp
  profile_path: data_new/yelp/itm_prf.pkl
  data_dir: data_new/yelp
  min_user_interactions: 5
  min_item_interactions: 5
  recency_half_life: 30.0
lightgcn:
  embedding_dim: 64
  n_layers: 3
pretrain:
  epochs: 10
  batch_size: 4096
  lr: 0.001
  weight_decay: 0
  device: cuda
  num_workers: 0
  reg: 1e-4
  save_path: checkpoints/lightgcn_yelp_pretrain_smoke.pth
train:
  epochs: 1
  batch_size: 1024
  lr: 0.0001
  weight_decay: 0
  num_workers: 0
  device: cuda
  reg: 1e-4
  eval_interval: 1
  save_path: checkpoints/lightgcn_yelp_train_smoke.pth
semantic:
  enable: true
  budget_ratio: 0.0002
  min_selected_items: 2
  llama_url: http://127.0.0.1:8080/v1/chat/completions
